# Dokploy deployment compose for MISJustice Alliance Firm
# Deploys the three priority services: MCAS, SearXNG + LiteLLM, n8n
# Plus shared backing services: PostgreSQL, Redis
# -----------------------------------------------------------------------------

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Shared relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: misjustice-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set PostgreSQL password}
      POSTGRES_DB: ${POSTGRES_DB:-mcas}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - misjustice-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcas} -d ${POSTGRES_DB:-mcas}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache, sessions, task queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: misjustice-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - misjustice-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MCAS — Matter Case Administration API (FastAPI)
  # ---------------------------------------------------------------------------
  mcas:
    build:
      context: ./services/mcas
      dockerfile: Dockerfile
    container_name: misjustice-mcas
    restart: unless-stopped
    logging: *default-logging
    environment:
      MCAS_ENV: ${MCAS_ENV:-production}
      MCAS_DATABASE_URL: ${MCAS_DATABASE_URL:-postgresql+asyncpg://mcas:${POSTGRES_PASSWORD}@postgres:5432/mcas}
      MCAS_REDIS_URL: ${MCAS_REDIS_URL:-redis://redis:6379/0}
    networks:
      - misjustice-net
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcasservice.rule=Host(`${MCAS_DOMAIN}`)"
      - "traefik.http.routers.mcasservice.entrypoints=websecure"
      - "traefik.http.routers.mcasservice.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcasservice.loadbalancer.server.port=8000"
      - "traefik.docker.network=dokploy-network"

  # ---------------------------------------------------------------------------
  # SearXNG — Privacy-respecting metasearch
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:2024.11.15-94a3ff695
    container_name: misjustice-searxng
    restart: unless-stopped
    logging: *default-logging
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SearXNG secret key}
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - misjustice-net
      - dokploy-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxngservice.rule=Host(`${SEARXNG_DOMAIN}`)"
      - "traefik.http.routers.searxngservice.entrypoints=websecure"
      - "traefik.http.routers.searxngservice.tls.certresolver=letsencrypt"
      - "traefik.http.services.searxngservice.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — Unified LLM routing with tier-based blocking
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: misjustice-litellm
    restart: unless-stopped
    logging: *default-logging
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LiteLLM master key}
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://mcas:${POSTGRES_PASSWORD}@postgres:5432/litellm}
      STORE_MODEL_IN_DB: "True"
    command: >
      --config /app/config.yaml
      --port 4000
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    networks:
      - misjustice-net
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellmservice.rule=Host(`${LITELLM_DOMAIN}`)"
      - "traefik.http.routers.litellmservice.entrypoints=websecure"
      - "traefik.http.routers.litellmservice.tls.certresolver=letsencrypt"
      - "traefik.http.services.litellmservice.loadbalancer.server.port=4000"
      - "traefik.docker.network=dokploy-network"

  # ---------------------------------------------------------------------------
  # n8n — HITL Workflow Orchestration
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.70.0
    container_name: misjustice-n8n
    restart: unless-stopped
    logging: *default-logging
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?Set n8n basic auth password}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost/n8n/}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-mcas}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set n8n encryption key}
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - misjustice-net
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8nservice.rule=Host(`${N8N_DOMAIN}`)"
      - "traefik.http.routers.n8nservice.entrypoints=websecure"
      - "traefik.http.routers.n8nservice.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8nservice.loadbalancer.server.port=5678"
      - "traefik.docker.network=dokploy-network"

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  misjustice-net:
    driver: bridge
  dokploy-network:
    external: true

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
